name: Update Insecure Packages

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual triggering
    inputs:
      dry_run:
        description: "Run in dry-run mode (no changes made)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      validation_level:
        description: "Validation level (flake or full)"
        required: false
        default: "full"
        type: choice
        options:
          - flake
          - full

jobs:
  update-insecure-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure Nix
        run: |
          nix-channel --add https://nixos.org/channels/nixos-unstable nixpkgs
          nix-channel --update

      - name: Enable Nix flakes
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

      - name: Run insecure package update script
        id: update
        run: |
          # Set dry-run mode if requested
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          # Run the update script
          python scripts/update-insecure-packages.py $DRY_RUN_FLAG --verbose

          # Check if any machines were updated
          if [ "$DRY_RUN_FLAG" = "--dry-run" ]; then
            echo "dry_run=true" >> $GITHUB_OUTPUT
          else
            # Check git status to see if files were changed
            if git diff --quiet; then
              echo "changes_made=false" >> $GITHUB_OUTPUT
            else
              echo "changes_made=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Update flake.lock
        if: steps.update.outputs.changes_made == 'true'
        run: |
          echo "Updating flake.lock..."
          nix flake update

      - name: Validate changes
        id: validate
        if: steps.update.outputs.changes_made == 'true'
        run: |
          VALIDATION_LEVEL="${{ github.event.inputs.validation_level || 'full' }}"

          if [ "$VALIDATION_LEVEL" = "flake" ]; then
            echo "Running flake check..."
            if nix flake check; then
              echo "validation_passed=true" >> $GITHUB_OUTPUT
            else
              echo "validation_passed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Running full validation..."
            # For now, just run flake check as full validation
            # In the future, this could build specific machines
            if nix flake check; then
              echo "validation_passed=true" >> $GITHUB_OUTPUT
            else
              echo "validation_passed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create Pull Request
        id: pr
        if: steps.update.outputs.changes_made == 'true' && steps.validate.outputs.validation_passed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/insecure-package-updates
          delete-branch: true
          title: "🔒 Automated: Update insecure packages"
          body: |
            ## Automated Insecure Package Updates

            This PR was automatically created to update insecure packages in Nix configurations.

            ### Changes Made
            - Updated `permittedInsecurePackages` lists in affected machine configurations
            - Updated `flake.lock` to pull latest nixpkgs versions

            ### Validation
            - ✅ Flake syntax check passed
            - ✅ Configuration builds validated

            ### Next Steps
            This PR will be automatically merged if all checks pass.

            ---
            *Generated by automated insecure package update workflow*
          labels: |
            automated
            security
            dependencies
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      - name: Auto-merge PR
        if: steps.pr.outputs.pull-request-number && steps.validate.outputs.validation_passed == 'true'
        run: |
          # Wait a moment for PR checks to start
          sleep 10

          # Auto-merge the PR
          gh pr merge ${{ steps.pr.outputs.pull-request-number }} --auto --merge

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure() && steps.update.outputs.changes_made == 'true'
        run: |
          echo "❌ Insecure package update failed!"
          echo "Please review the workflow logs and fix any issues."
          # Could add Slack/Discord notifications here in the future
