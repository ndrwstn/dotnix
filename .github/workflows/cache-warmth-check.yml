name: Cache Warmth Check

on:
  schedule:
    - cron: "0 */3 * * *" # Every 3 hours
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write # Needed for label operations

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Check cache and merge first warm PR
        run: |
          MERGED=""

          for TAG in $(gh pr list \
            --label "staging-pending" \
            --state open \
            --json number,headRefName \
            --jq -r '.[] | "\(.number):\(.headRefName)"'); do

            NUM="${TAG%%:*}"
            BRANCH="${TAG#*:}"

            echo "Checking PR #$NUM ($BRANCH)..."

            gh pr checkout "$NUM" 2>/dev/null

            OUTPUT=$(nix build ".#nixosConfigurations.silver.config.system.build.toplevel" \
              --dry-run --no-link 2>&1)
            RC=$?

            if [ $RC -eq 0 ] && \
               echo "$OUTPUT" | grep -q "0 derivations will be built"; then
              echo "✅ PR #$NUM is WARM — merging"
              gh pr merge --squash "$NUM"
              MERGED="$NUM"
              break
            else
              BUILD_COUNT=$(echo "$OUTPUT" | grep -c "will be built" || true)
              FETCH_COUNT=$(echo "$OUTPUT" | grep -c "will be fetched" || true)
              echo "⏳ PR #$NUM: ${BUILD_COUNT:-0} derivation(s) still need building"
            fi
          done

          # Close remaining staging PRs if one was merged
          if [ -n "$MERGED" ]; then
            for TAG in $(gh pr list \
              --label "staging-pending" \
              --state open \
              --json number \
              --jq -r '.[] | .number'); do
              if [ "$TAG" != "$MERGED" ]; then
                gh pr edit "$TAG" \
                  --remove-label "staging-pending" \
                  --add-label "ndrwstn"
                gh pr close "$TAG" \
                  --comment "Superseded by merged PR #${MERGED}"
                echo "Closed PR #$TAG (superseded by #$MERGED)"
              fi
            done
          else
            echo "No warm PR found — next check in 3 hours"
          fi
