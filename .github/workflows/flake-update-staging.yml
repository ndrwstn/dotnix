name: Flake Update Staging

on:
  schedule:
    - cron: "0 4 */3 * *" # Every 3 days at 4 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write # Needed for label operations

jobs:
  create-staging-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Configure git auth for push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Tag previous staging PR as superseded
        run: |
          for PR in $(gh pr list \
            --label "staging-pending" \
            --json number \
            --jq '.[].number'); do
            gh pr edit "$PR" --add-label "ndrwstn"
          done

      - name: Update all flake inputs
        run: nix flake update

      - name: Update broadcom-sta pin
        run: python3 scripts/update-silver-broadcom-pin.py

      - name: Validate flake
        run: nix flake check

      - name: Create staging PR
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="staging/flake-update-$DATE"
          git add flake.lock machines/silver/configuration.nix
          git commit -m "update(lock): refresh flake inputs"
          git push origin HEAD:"$BRANCH" --force
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "update(lock): refresh flake inputs" \
            --body "Auto-merge when Hydra Status Check confirms all nixpkgs revisions are built." \
            --label "staging-pending"
