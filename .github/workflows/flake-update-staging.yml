name: Flake Update Staging

on:
  schedule:
    - cron: "0 4 */3 * *" # Every 3 days at 4 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write # Needed for label operations

jobs:
  create-staging-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Configure git auth for push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "staging-pending" --color "0E8A16" \
            --description "Staged flake update — awaiting Hydra status check" 2>/dev/null || true
          gh label create "ndrwstn" --color "BFD4F2" \
            --description "Misc/uncategorized nix changes" 2>/dev/null || true

      - name: Supersede previous staging PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for PR in $(gh pr list \
            --label "staging-pending" \
            --json number \
            --jq '.[].number'); do
            gh pr edit "$PR" \
              --remove-label "staging-pending" \
              --add-label "ndrwstn"
          done

      - name: Update all flake inputs
        run: nix flake update

      - name: Update broadcom-sta pin
        run: python3 scripts/update-broadcom-pin.py

      - name: Validate flake
        run: nix flake check

      - name: Create staging PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="staging/flake-update-$DATE"
          git add flake.lock machines/silver/configuration.nix
          git commit -m "update(lock): refresh flake inputs"
          git push origin HEAD:"$BRANCH" --force
          # Create PR or ensure existing one has the staging-pending label
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "update(lock): refresh flake inputs" \
            --body "Auto-merge when Hydra Status Check confirms primary nixpkgs inputs are Hydra/channel-ready." \
            --label "staging-pending" 2>/dev/null \
          || { 
            PR_NUM=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
            echo "PR #$PR_NUM already exists — refreshing staging-pending label"
            gh pr edit "$PR_NUM" --add-label "staging-pending" 2>/dev/null || true
          }
