name: Hydra Status Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [master]
  workflow_run:
    workflows: ["Flake Update Staging"]
    types: [completed]
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # ── Checkout base branch first (needed for gh to know the repo) ─────
      - uses: actions/checkout@v6

      # ── Determine PR and head SHA ──────────────────────────────────────
      - name: Determine PR to check
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || \
             [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_JSON=$(gh pr list --label "staging-pending" --state open \
              --json number,headRefName,headRefOid)
            PR_COUNT=$(echo "$PR_JSON" | jq -r 'length')
            if [ "$PR_COUNT" = "0" ]; then
              echo "No staging PRs found — nothing to check"
              echo "SKIP=true" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "pr_number=$(echo "$PR_JSON" | jq -r '.[0].number')" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(echo "$PR_JSON" | jq -r '.[0].headRefOid')" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Flake Update Staging did not succeed — skipping"
              echo "SKIP=true" >> "$GITHUB_ENV"
              exit 0
            fi
            # Try label search first (fast path)
            PR_JSON=$(gh pr list --label "staging-pending" --state open \
              --json number,headRefOid)
            PR_COUNT=$(echo "$PR_JSON" | jq -r 'length')
            if [ "$PR_COUNT" = "0" ]; then
              # Retry once after a brief delay to handle API indexing latency
              echo "Retrying label search after 10s..."
              sleep 10
              PR_JSON=$(gh pr list --label "staging-pending" --state open \
                --json number,headRefOid)
              PR_COUNT=$(echo "$PR_JSON" | jq -r 'length')
            fi
            if [ "$PR_COUNT" = "0" ]; then
              # Fallback: find most recent open staging PR by branch pattern
              echo "Label search gave up — trying branch pattern fallback"
              BRANCH_RESULTS=$(gh pr list --head "staging/flake-update-" --state open \
                --json number,headRefOid,createdAt)
              BRANCH_COUNT=$(echo "$BRANCH_RESULTS" | jq -r 'length')
              if [ "$BRANCH_COUNT" = "0" ]; then
                echo "No staging PR found via branch pattern either — skipping"
                echo "SKIP=true" >> "$GITHUB_ENV"
                exit 0
              fi
              LATEST=$(echo "$BRANCH_RESULTS" | jq -r 'sort_by(.createdAt) | reverse | .[0]')
              echo "pr_number=$(echo "$LATEST" | jq -r '.number')" >> "$GITHUB_OUTPUT"
              echo "head_sha=$(echo "$LATEST" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
            else
              echo "pr_number=$(echo "$PR_JSON" | jq -r '.[0].number')" >> "$GITHUB_OUTPUT"
              echo "head_sha=$(echo "$PR_JSON" | jq -r '.[0].headRefOid')" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Label check (PR-triggered only) ────────────────────────────────
      - name: Check for staging-pending label
        id: label_check
        if: env.SKIP != 'true' && github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh pr view "${{ steps.target.outputs.pr_number }}" \
            --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "^staging-pending$"; then
            echo "PR has staging-pending label — proceeding"
          else
            echo "PR does not have staging-pending label — skipping"
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      # ── Validate PR eligibility (same-repo, bot-created, master-target) ──
      - name: Validate PR eligibility
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_INFO=$(gh pr view "${{ steps.target.outputs.pr_number }}" \
            --json author,headRepository,headRepositoryOwner,headRefName,baseRefName,files)

          AUTHOR=$(echo "$PR_INFO" | jq -r '.author.login')
          HEAD_REPO=$(echo "$PR_INFO" | jq -r '.headRepository.name')
          OWNER=$(echo "$PR_INFO" | jq -r '.headRepositoryOwner.login')
          BRANCH=$(echo "$PR_INFO" | jq -r '.headRefName')
          BASE=$(echo "$PR_INFO" | jq -r '.baseRefName')
          FILES=$(echo "$PR_INFO" | jq -r '.files[].path')

          # Author must be github-actions (bot or app)
          case "$AUTHOR" in
            "github-actions[bot]"|"app/github-actions") ;;
            *)
              echo "PR author not github-actions: $AUTHOR"
              echo "SKIP=true" >> "$GITHUB_ENV"
              exit 0
              ;;
          esac

          # Head repo must be the same repository
          if [ "$HEAD_REPO" != "${{ github.event.repository.name }}" ]; then
            echo "PR head repo mismatch: $HEAD_REPO"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # Owner must match
          if [ "$OWNER" != "${{ github.repository_owner }}" ]; then
            echo "PR owner mismatch: $OWNER"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # Branch must follow staging convention
          if ! echo "$BRANCH" | grep -q "^staging/flake-update-"; then
            echo "PR branch not a staging update: $BRANCH"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # Base must be master
          if [ "$BASE" != "master" ]; then
            echo "PR base is not master: $BASE"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # Changed files must be within the expected allowlist
          ALLOWED=0
          for f in $FILES; do
            case "$f" in
              flake.lock|machines/silver/configuration.nix) ;;
              *)
                echo "Unexpected changed file: $f"
                echo "SKIP=true" >> "$GITHUB_ENV"
                exit 0
                ;;
            esac
          done
          if [ -z "$FILES" ]; then
            echo "PR has no changed files"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "PR eligibility check passed"

      # ── Create in-progress check run (visible feedback while API runs) ───
      - name: Create in-progress check run
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/update-check-run.py \
            "${{ steps.target.outputs.head_sha }}" \
            "in_progress"

      # ── Extract flake.lock from PR head (untrusted data only) ─────────
      - name: Fetch PR flake.lock
        if: env.SKIP != 'true' && steps.target.outputs.pr_number != ''
        run: |
          git fetch origin refs/pull/${{ steps.target.outputs.pr_number }}/head
          git show FETCH_HEAD:flake.lock > /tmp/pr-flake.lock

      # ── Run hydra status check (trusted code, PR's data) ──────────────
      - name: Run hydra status check
        if: env.SKIP != 'true'
        id: hydra
        run: |
          python3 scripts/check-hydra.py /tmp/pr-flake.lock > /tmp/hydra-result.json
          cat /tmp/hydra-result.json
          python3 -c "import json; d=json.load(open('/tmp/hydra-result.json')); print('ready=' + ('true' if d.get('ready') else 'false'))" >> "$GITHUB_OUTPUT"

      # ── Create/update check run ────────────────────────────────────────
      - name: Update check run status
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/update-check-run.py \
            "${{ steps.target.outputs.head_sha }}" \
            "${{ steps.hydra.outputs.ready }}"

      # ── Merge if ready ──────────────────────────────────────────────────
      - name: Merge ready staging PR
        if: env.SKIP != 'true' && steps.hydra.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ steps.target.outputs.pr_number }}"
          echo "Merging ready PR #$PR_NUM"
          gh pr merge --squash "$PR_NUM"

          # Close remaining staging PRs as superseded
          for TAG in $(gh pr list \
            --label "staging-pending" --state open \
            --json number --jq '.[] | .number'); do
            if [ "$TAG" != "$PR_NUM" ]; then
              gh pr edit "$TAG" \
                --remove-label "staging-pending" \
                --add-label "ndrwstn" 2>/dev/null || true
              gh pr close "$TAG" \
                --comment "Superseded by merged PR #${PR_NUM}" 2>/dev/null || true
            fi
          done
